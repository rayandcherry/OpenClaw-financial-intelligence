[pytest]
# Ensure src/ and project root are on the Python path
# src      → allows `import mcp_server` (bare imports inside src/)
# .        → allows `from src.mcp_server import ...` (package-style imports in tests)
pythonpath = src .

# Register custom markers to avoid PytestUnknownMarkWarning
markers =
    integration: marks tests that hit real external APIs/network (deselect with -m "not integration")
    asyncio: marks tests as async

# Default: skip integration tests unless explicitly requested via -m integration or -m ""
addopts = -m "not integration"

# Asyncio mode
asyncio_mode = auto

# Suppress known deprecation noise during test runs
filterwarnings =
    ignore::UserWarning:pydantic
